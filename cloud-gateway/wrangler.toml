name = "mykey-compute-gateway"
main = "src/index.ts"
compatibility_date = "2026-05-19"
compatibility_flags = ["nodejs_compat"]

# Public, non-secret variables. Secrets (SERVER_PEPPER, ADMIN_TOKEN,
# MASTER_KEY_V1) are uploaded via `wrangler secret put` — never committed.
[vars]
PUBLIC_GATEWAY_URL = "https://api.mykey.example"

# Comma-separated IPv4 / CIDR list that may reach /admin/*. Empty value =
# unrestricted (dev). Production deploys MUST narrow this — e.g.
# "203.0.113.5,10.0.0.0/24" — so a leaked admin token alone cannot drive
# the control plane.
ADMIN_IP_ALLOWLIST = ""

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "mykey-compute-gateway"
# Replace after running: wrangler d1 create mykey-compute-gateway
database_id = "d9cfa3b8-b84d-44ff-9e69-2a2b7da179ed"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "ACCOUNT_DO"
class_name = "AccountDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AccountDurableObject"]
