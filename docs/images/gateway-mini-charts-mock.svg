<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="0.52" stop-color="#f4f1ea"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#fff2e8" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff4ec"/>
      <stop offset="1" stop-color="#ffe8db"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1f2937" flood-opacity="0.10"/>
    </filter>
    <style>
      .h1 { font: 700 30px "Space Grotesk", system-ui, -apple-system; fill: #111827; letter-spacing: -0.02em; }
      .h2 { font: 700 16px "Space Grotesk", system-ui, -apple-system; fill: #111827; letter-spacing: -0.01em; }
      .p  { font: 500 13px "Space Grotesk", system-ui, -apple-system; fill: #6b7280; }
      .kpiLabel { font: 700 10px "JetBrains Mono", ui-monospace; fill: #6b7280; letter-spacing: 0.08em; }
      .kpiValue { font: 700 20px "Space Grotesk", system-ui, -apple-system; fill: #111827; letter-spacing: -0.02em; }
      .kpiSmall { font: 600 11px "JetBrains Mono", ui-monospace; fill: #6b7280; }
      .chip { font: 700 11px "JetBrains Mono", ui-monospace; fill: #9a3412; letter-spacing: 0.02em; }
      .axis { stroke: rgba(17,24,39,0.12); stroke-width: 1; }
      .grid { stroke: rgba(17,24,39,0.08); stroke-width: 1; }
      .bar { fill: rgba(255,107,61,0.18); }
      .bar2 { fill: rgba(14,165,233,0.18); }
      .line { fill: none; stroke: #e4532a; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; opacity: 0.92; }
      .lineBlue { fill: none; stroke: #0369a1; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; opacity: 0.92; }
      .lineGreen { fill: none; stroke: #15803d; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; opacity: 0.92; }
      .dot { fill: #111827; }
      .band { fill: rgba(17,24,39,0.07); }
      .warn { fill: #b91c1c; }
      .pillText { font: 700 11px "Space Grotesk", system-ui, -apple-system; fill: #111827; }
      .pillMuted { font: 600 11px "Space Grotesk", system-ui, -apple-system; fill: #6b7280; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1400" height="780" fill="url(#bg)"/>

  <!-- Main container -->
  <rect x="60" y="56" width="1280" height="668" rx="26" fill="rgba(255,255,255,0.35)" stroke="rgba(234,223,206,0.9)"/>

  <!-- Header -->
  <text x="96" y="118" class="h1">Gateway 分析面板</text>
  <text x="96" y="146" class="p">按窗口聚合应用 / 模型流量、趋势与异常 Top。图表 hover 会显示该分钟的成本、token、错误和延迟。</text>

  <!-- Controls -->
  <rect x="1030" y="92" width="150" height="34" rx="12" fill="url(#panel)" stroke="rgba(234,223,206,0.9)" filter="url(#shadow)"/>
  <text x="1046" y="114" class="pillMuted">窗口</text>
  <text x="1096" y="114" class="pillText">1 小时</text>
  <text x="1166" y="114" class="pillMuted">▼</text>

  <rect x="1190" y="92" width="132" height="34" rx="12" fill="url(#panel)" stroke="rgba(255,107,61,0.42)" filter="url(#shadow)"/>
  <text x="1210" y="114" class="pillText">刷新</text>
  <text x="1266" y="114" class="pillMuted">↻</text>

  <!-- KPI row -->
  <!-- KPI cards -->
  <g filter="url(#shadow)">
    <rect x="96" y="176" width="238" height="74" rx="14" fill="rgba(236,253,245,0.92)" stroke="rgba(22,163,74,0.26)"/>
    <text x="114" y="202" class="kpiLabel">TOTAL REQUESTS</text>
    <text x="114" y="226" class="kpiValue">1,248</text>
    <text x="114" y="246" class="kpiSmall">20.8 req/min</text>

    <rect x="350" y="176" width="238" height="74" rx="14" fill="rgba(240,249,255,0.94)" stroke="rgba(14,165,233,0.22)"/>
    <text x="368" y="202" class="kpiLabel">SUCCESS / ERROR</text>
    <text x="368" y="226" class="kpiValue">97.6%</text>
    <text x="368" y="246" class="kpiSmall">error 2.4%</text>

    <rect x="604" y="176" width="238" height="74" rx="14" fill="rgba(255,247,237,0.94)" stroke="rgba(249,115,22,0.26)"/>
    <text x="622" y="202" class="kpiLabel">AVG / P95 LATENCY</text>
    <text x="622" y="226" class="kpiValue">182ms</text>
    <text x="622" y="246" class="kpiSmall">p95 420ms</text>

    <rect x="858" y="176" width="238" height="74" rx="14" fill="rgba(254,242,242,0.92)" stroke="rgba(239,68,68,0.20)"/>
    <text x="876" y="202" class="kpiLabel">BLOCKED / COST</text>
    <text x="876" y="226" class="kpiValue">36</text>
    <text x="876" y="246" class="kpiSmall">$1.2370</text>
  </g>

  <!-- Chart row -->
  <g filter="url(#shadow)">
    <!-- Card 1: Burn -->
    <rect x="96" y="278" width="404" height="228" rx="18" fill="url(#panel)" stroke="rgba(234,223,206,0.9)"/>
    <text x="122" y="312" class="h2">Cost Burn (每分钟)</text>
    <text x="122" y="334" class="p">预算线 + 燃烧柱状图</text>

    <!-- burn bars -->
    <g transform="translate(118 352)">
      <rect x="0" y="0" width="360" height="120" rx="10" fill="rgba(17,24,39,0.03)" stroke="rgba(17,24,39,0.06)"/>
      <line x1="0" y1="30" x2="360" y2="30" class="grid"/>
      <line x1="0" y1="60" x2="360" y2="60" class="grid"/>
      <line x1="0" y1="90" x2="360" y2="90" class="grid"/>

      <!-- budget line -->
      <line x1="0" y1="46" x2="360" y2="46" stroke="rgba(22,163,74,0.55)" stroke-width="2" stroke-dasharray="5 5"/>

      <!-- bars -->
      <g>
        <rect class="bar" x="12"  y="92" width="10" height="28" rx="3"/>
        <rect class="bar" x="28"  y="86" width="10" height="34" rx="3"/>
        <rect class="bar" x="44"  y="80" width="10" height="40" rx="3"/>
        <rect class="bar" x="60"  y="66" width="10" height="54" rx="3"/>
        <rect class="bar" x="76"  y="70" width="10" height="50" rx="3"/>
        <rect class="bar" x="92"  y="74" width="10" height="46" rx="3"/>
        <rect class="bar" x="108" y="78" width="10" height="42" rx="3"/>
        <rect class="bar" x="124" y="86" width="10" height="34" rx="3"/>
        <rect class="bar" x="140" y="90" width="10" height="30" rx="3"/>
        <rect class="bar" x="156" y="84" width="10" height="36" rx="3"/>
        <rect class="bar" x="172" y="76" width="10" height="44" rx="3"/>
        <rect class="bar" x="188" y="62" width="10" height="58" rx="3"/>
        <rect class="bar" x="204" y="58" width="10" height="62" rx="3"/>
        <rect class="bar" x="220" y="64" width="10" height="56" rx="3"/>
        <rect class="bar" x="236" y="72" width="10" height="48" rx="3"/>
        <rect class="bar" x="252" y="86" width="10" height="34" rx="3"/>
        <rect class="bar" x="268" y="92" width="10" height="28" rx="3"/>
        <rect class="bar" x="284" y="96" width="10" height="24" rx="3"/>
        <rect class="bar" x="300" y="88" width="10" height="32" rx="3"/>
        <rect class="bar" x="316" y="80" width="10" height="40" rx="3"/>
        <rect class="bar" x="332" y="70" width="10" height="50" rx="3"/>
      </g>

      <!-- selection band -->
      <rect class="band" x="184" y="0" width="22" height="120" rx="6"/>
    </g>

    <text x="122" y="498" class="kpiSmall">hover: 10:42 | $0.0231 | 18 req | 1 err | 6.2k tok</text>

    <!-- Card 2: Requests / Errors -->
    <rect x="518" y="278" width="404" height="228" rx="18" fill="url(#panel)" stroke="rgba(234,223,206,0.9)"/>
    <text x="544" y="312" class="h2">Requests & Errors</text>
    <text x="544" y="334" class="p">req/min 柱 + errors 线</text>

    <g transform="translate(540 352)">
      <rect x="0" y="0" width="360" height="120" rx="10" fill="rgba(17,24,39,0.03)" stroke="rgba(17,24,39,0.06)"/>
      <line x1="0" y1="30" x2="360" y2="30" class="grid"/>
      <line x1="0" y1="60" x2="360" y2="60" class="grid"/>
      <line x1="0" y1="90" x2="360" y2="90" class="grid"/>

      <!-- request bars -->
      <g>
        <rect class="bar2" x="12"  y="78" width="10" height="42" rx="3"/>
        <rect class="bar2" x="28"  y="70" width="10" height="50" rx="3"/>
        <rect class="bar2" x="44"  y="66" width="10" height="54" rx="3"/>
        <rect class="bar2" x="60"  y="58" width="10" height="62" rx="3"/>
        <rect class="bar2" x="76"  y="54" width="10" height="66" rx="3"/>
        <rect class="bar2" x="92"  y="60" width="10" height="60" rx="3"/>
        <rect class="bar2" x="108" y="72" width="10" height="48" rx="3"/>
        <rect class="bar2" x="124" y="78" width="10" height="42" rx="3"/>
        <rect class="bar2" x="140" y="86" width="10" height="34" rx="3"/>
        <rect class="bar2" x="156" y="80" width="10" height="40" rx="3"/>
        <rect class="bar2" x="172" y="72" width="10" height="48" rx="3"/>
        <rect class="bar2" x="188" y="58" width="10" height="62" rx="3"/>
        <rect class="bar2" x="204" y="54" width="10" height="66" rx="3"/>
        <rect class="bar2" x="220" y="64" width="10" height="56" rx="3"/>
        <rect class="bar2" x="236" y="76" width="10" height="44" rx="3"/>
        <rect class="bar2" x="252" y="82" width="10" height="38" rx="3"/>
        <rect class="bar2" x="268" y="88" width="10" height="32" rx="3"/>
        <rect class="bar2" x="284" y="92" width="10" height="28" rx="3"/>
        <rect class="bar2" x="300" y="86" width="10" height="34" rx="3"/>
        <rect class="bar2" x="316" y="74" width="10" height="46" rx="3"/>
        <rect class="bar2" x="332" y="66" width="10" height="54" rx="3"/>
      </g>

      <!-- error line -->
      <polyline class="line" points="16,92 32,90 48,88 64,84 80,86 96,88 112,92 128,94 144,96 160,94 176,92 192,80 208,84 224,90 240,94 256,96 272,98 288,98 304,96 320,92 336,90"/>

      <!-- selection band -->
      <rect class="band" x="184" y="0" width="22" height="120" rx="6"/>
    </g>

    <text x="544" y="498" class="kpiSmall">hover: 10:42 | 18 req | 1 err (5.6%)</text>

    <!-- Card 3: Latency -->
    <rect x="940" y="278" width="400" height="228" rx="18" fill="url(#panel)" stroke="rgba(234,223,206,0.9)"/>
    <text x="966" y="312" class="h2">Latency</text>
    <text x="966" y="334" class="p">avg 折线 + p95 参考线</text>

    <g transform="translate(962 352)">
      <rect x="0" y="0" width="356" height="120" rx="10" fill="rgba(17,24,39,0.03)" stroke="rgba(17,24,39,0.06)"/>
      <line x1="0" y1="30" x2="356" y2="30" class="grid"/>
      <line x1="0" y1="60" x2="356" y2="60" class="grid"/>
      <line x1="0" y1="90" x2="356" y2="90" class="grid"/>

      <!-- p95 line -->
      <line x1="0" y1="40" x2="356" y2="40" stroke="rgba(249,115,22,0.55)" stroke-width="2" stroke-dasharray="5 5"/>

      <!-- avg line -->
      <polyline class="lineGreen" points="12,78 28,74 44,70 60,66 76,62 92,58 108,60 124,64 140,66 156,62 172,58 188,52 204,48 220,50 236,56 252,60 268,64 284,68 300,70 316,66 332,62"/>
      <circle class="dot" cx="196" cy="52" r="4"/>

      <!-- selection band -->
      <rect class="band" x="180" y="0" width="22" height="120" rx="6"/>
    </g>

    <text x="966" y="498" class="kpiSmall">hover: 10:42 | avg 182ms | p95 420ms</text>
  </g>

  <!-- Footer detail line -->
  <rect x="96" y="528" width="1244" height="62" rx="18" fill="rgba(255,255,255,0.70)" stroke="rgba(234,223,206,0.9)"/>
  <text x="122" y="562" class="h2">选中分钟详情</text>
  <text x="122" y="585" class="p">10:42 | provider=openai | model=gpt-4.1 | $0.0231 | 18 req | 1 err | 6.2k tok | avg 182ms | p95 420ms</text>

  <!-- Note pills -->
  <g>
    <rect x="1024" y="542" width="144" height="28" rx="999" fill="url(#chip)" stroke="rgba(255,107,61,0.34)"/>
    <text x="1040" y="561" class="chip">点击 Top 条目=筛选</text>
    <rect x="1180" y="542" width="140" height="28" rx="999" fill="rgba(254,242,242,0.9)" stroke="rgba(239,68,68,0.26)"/>
    <text x="1196" y="561" class="chip" fill="#b91c1c">异常峰值会高亮</text>
  </g>
</svg>

